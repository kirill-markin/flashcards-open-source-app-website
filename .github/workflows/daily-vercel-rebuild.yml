name: Daily Vercel Rebuild

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  trigger-vercel-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Vercel deploy hook
        timeout-minutes: 3
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing VERCEL_DEPLOY_HOOK_URL repository secret." >&2
            exit 1
          fi

          curl \
            --fail \
            --show-error \
            --silent \
            --request POST \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            "$VERCEL_DEPLOY_HOOK_URL"
